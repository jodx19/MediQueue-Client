<div class="super-admin-container" @pageEnter>
  <header class="page-header">
    <div class="header-content">
      <h1 class="page-title">Super Admin Panel</h1>
      <button class="btn btn-primary" (click)="openModal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Add Staff Member
      </button>
    </div>
  </header>

  <main class="staff-section" @fadeSlideIn>
    <div class="table-card">
      <table class="staff-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let staff of staffList()">
            <td>
              <div class="staff-name">
                <span class="avatar">{{ staff.firstName[0] }}{{ staff.lastName[0] }}</span>
                {{ staff.firstName }} {{ staff.lastName }}
              </div>
            </td>
            <td>{{ staff.email }}</td>
            <td><span class="badge role-badge">{{ staff.role }}</span></td>
            <td>
              <span class="status-indicator" [class.active]="staff.status === 'Active'"></span>
              {{ staff.status }}
            </td>
            <td>
              <div class="actions">
                <button class="btn-icon" title="Reset Password">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3y-3.5 3.5z"/>
                  </svg>
                </button>
                <button class="btn-icon danger" (click)="deactivateStaff(staff.email)" title="Deactivate">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18.36 6.64a9 9 0 1 1-12.73 0M12 2v10"/>
                  </svg>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="staffList().length === 0">
            <td colspan="5" class="empty-state">No staff members found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Add Staff Modal -->
  <div class="modal-overlay" *ngIf="isModalOpen()" @fadeSlideIn>
    <div class="modal-card">
      <div class="modal-header">
        <h2>Add Staff Member</h2>
        <button class="btn-close" (click)="closeModal()">&times;</button>
      </div>
      <form (ngSubmit)="createAccount()" #staffForm="ngForm">
        <div class="form-grid">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" name="firstName" [(ngModel)]="newStaff.firstName" required>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" name="lastName" [(ngModel)]="newStaff.lastName" required>
          </div>
          <div class="form-group full-width">
            <label>Email Address</label>
            <input type="email" name="email" [(ngModel)]="newStaff.email" required>
          </div>
          <div class="form-group">
            <label>Role</label>
            <select name="role" [(ngModel)]="newStaff.role" required>
              <option *ngFor="let role of roles" [value]="role">{{ role }}</option>
            </select>
          </div>
          <div class="form-group">
            <label>Temp Password</label>
            <input type="password" name="password" [(ngModel)]="newStaff.password" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" (click)="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="!staffForm.valid || isLoading()">
            {{ isLoading() ? 'Creating...' : 'Create Account' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
