<div class="h-screen flex bg-[var(--mq-slate)] overflow-hidden font-sans">
  
  <!-- SIDEBAR (Desktop) -->
  <aside [ngClass]="{'w-[260px]': !collapsed()}" [ngClass]="{'w-[72px]': collapsed()}" class="hidden md:flex flex-col bg-[var(--mq-navy)] text-white transition-all duration-300 z-20 relative shadow-2xl">
    
    <!-- Sidebar Header -->
    <div class="h-16 flex items-center px-4 border-b border-[var(--mq-navy-700)] overflow-hidden shrink-0">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[var(--mq-teal)] to-[var(--mq-teal-900)] flex items-center justify-center text-white font-bold text-xl shrink-0">MQ</div>
      <span *ngIf="!collapsed()" class="text-xl font-bold tracking-tight ml-3 whitespace-nowrap opacity-100 transition-opacity duration-300 delay-100">MediQueue</span>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto py-6 px-3 space-y-2 custom-scrollbar">
      <a *ngFor="let item of currentNav()" 
         [routerLink]="item.route" 
         routerLinkActive="bg-[var(--mq-teal)]/10 border-l-4 border-[var(--mq-teal)] text-[var(--mq-teal-400)]"
         [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center px-3 py-3 rounded-lg text-[var(--mq-slate-400)] hover:bg-white/5 hover:text-white transition-all duration-200 group border-l-4 border-transparent hover:translate-x-1">
        <lucide-icon [name]="item.icon" class="w-5 h-5 shrink-0" [ngClass]="{'text-[var(--mq-teal-400)]': false}"></lucide-icon>
        <span *ngIf="!collapsed()" class="ml-3 font-medium whitespace-nowrap">{{ item.label }}</span>
        
        <!-- Badge Example (Notifications) -->
        <span *ngIf="!collapsed() && item.label === 'Appointments' && notificationCount() > 0" class="ml-auto bg-[var(--mq-teal)] text-white text-xs font-bold px-2 py-0.5 rounded-full">
          {{ notificationCount() }}
        </span>
      </a>
    </nav>

    <!-- Sidebar Footer -->
    <div class="p-4 border-t border-[var(--mq-navy-700)] shrink-0">
      <div class="flex items-center gap-3 mb-4 p-2 rounded-xl bg-[var(--mq-navy-800)] border border-[var(--mq-navy-700)] overflow-hidden">
        <div class="relative shrink-0">
          <div class="w-10 h-10 rounded-full bg-[var(--mq-slate-600)] flex items-center justify-center font-bold">AS</div>
          <!-- SignalR Dot -->
          <div class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-[var(--mq-navy-800)]" [class.bg-green-500]="signalRConnected()" [class.bg-red-500]="!signalRConnected()"></div>
        </div>
        <div *ngIf="!collapsed()" class="flex-1 min-w-0">
          <div class="text-sm font-bold truncate text-white">{{ currentUser()?.firstName || currentUser()?.email || 'User' }}</div>
          <div class="text-xs text-[var(--mq-slate-400)] truncate">{{ userRole() }}</div>
        </div>
      </div>
      
      <button type="button" (click)="logout()" class="w-full flex items-center justify-center py-2 text-[var(--mq-slate-400)] hover:text-white hover:bg-white/5 rounded-lg transition-colors group">
        <lucide-icon name="LogOut" class="w-5 h-5"></lucide-icon>
        <span *ngIf="!collapsed()" class="ml-3 font-medium">Logout</span>
      </button>
    </div>

    <!-- Collapse Toggle -->
    <button (click)="toggleSidebar()" class="absolute -right-3 top-20 w-6 h-6 rounded-full bg-[var(--mq-navy-700)] text-white flex items-center justify-center hover:bg-[var(--mq-teal)] transition-colors border-2 border-[var(--mq-slate)] z-30">
      <lucide-icon [name]="collapsed() ? 'ChevronRight' : 'ChevronLeft'" class="w-4 h-4"></lucide-icon>
    </button>
  </aside>

  <!-- MAIN WRAPPER -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
    
    <!-- TOPBAR -->
    <header class="h-16 glass-light px-4 md:px-8 flex items-center justify-between border-b border-[var(--mq-slate-200)] shrink-0 z-10 sticky top-0 rounded-none border-x-0 border-t-0">
      
      <div class="flex items-center gap-4">
        <!-- Mobile Menu Toggle -->
        <button class="md:hidden text-[var(--mq-navy-700)]" (click)="toggleMobileMenu()">
          <lucide-icon name="Menu"></lucide-icon>
        </button>
        <h1 class="text-xl font-bold text-[var(--mq-navy)] hidden sm:block">Dashboard</h1>
      </div>

      <div class="flex items-center gap-4 md:gap-6">
        <!-- Search Bar (Glass) -->
        <div class="relative hidden sm:block">
          <lucide-icon name="Search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-[var(--mq-slate-400)]"></lucide-icon>
          <input type="text" placeholder="Search patients, doctors..." class="w-64 focus:w-80 transition-all duration-300 bg-white/50 border border-[var(--mq-slate-200)] rounded-full py-2 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--mq-teal-400)] backdrop-blur-md text-[var(--mq-navy)] placeholder-[var(--mq-slate-400)]">
        </div>

        <!-- Notifications -->
        <button class="relative p-2 text-[var(--mq-navy-700)] hover:text-[var(--mq-teal)] transition-colors">
          <lucide-icon name="Bell" class="w-6 h-6"></lucide-icon>
          <span *ngIf="notificationCount() > 0" class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-[var(--mq-slate)]"></span>
        </button>

        <!-- Mobile User Avatar -->
        <div class="md:hidden w-8 h-8 rounded-full bg-[var(--mq-navy)] flex items-center justify-center font-bold text-white text-xs relative">
          AS
          <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 rounded-full border border-white"></div>
        </div>
      </div>
    </header>

    <!-- CONTENT AREA -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar relative">
      <div [@pageEnter]="prepareRoute(outlet)">
        <router-outlet #outlet="outlet"></router-outlet>
      </div>
    </main>

    <!-- BOTTOM NAV (Mobile Only) -->
    <nav class="md:hidden glass-light border-t border-[var(--mq-slate-200)] pb-safe pt-2 px-6 flex justify-between shrink-0 sticky bottom-0 rounded-none border-x-0 border-b-0">
      <a *ngFor="let item of currentNav() | slice:0:5" 
         [routerLink]="item.route"
         routerLinkActive="text-[var(--mq-teal)]"
         [routerLinkActiveOptions]="{exact: true}"
         class="flex flex-col items-center justify-center py-2 text-[var(--mq-slate-400)] hover:text-[var(--mq-teal)] transition-colors relative group w-16">
        <lucide-icon [name]="item.icon" class="w-6 h-6 mb-1"></lucide-icon>
        <span class="text-[10px] font-medium opacity-100">{{ item.label }}</span>
        <!-- Active Indicator -->
        <div class="absolute top-0 w-8 h-1 bg-[var(--mq-teal)] rounded-b-md opacity-0 group-[.active]:opacity-100 transition-opacity"></div>
      </a>
    </nav>
    
  </div>

  <!-- Mobile Sidebar Overlay -->
  <div *ngIf="mobileMenuOpen()" class="fixed inset-0 bg-black/50 z-40 md:hidden" (click)="toggleMobileMenu()"></div>
  <aside *ngIf="mobileMenuOpen()" class="fixed inset-y-0 left-0 w-64 bg-[var(--mq-navy)] text-white z-50 flex flex-col shadow-2xl transform transition-transform duration-300 md:hidden animate-[reveal_300ms_ease-out_forwards]">
    <div class="p-4 border-b border-[var(--mq-navy-700)] flex justify-between items-center">
       <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-[var(--mq-teal)] flex items-center justify-center text-white font-bold">MQ</div>
          <span class="font-bold">MediQueue</span>
       </div>
    </div>
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-2">
      <a *ngFor="let item of currentNav()" 
         [routerLink]="item.route" 
         (click)="toggleMobileMenu()"
         routerLinkActive="bg-[var(--mq-teal)]/10 border-l-4 border-[var(--mq-teal)] text-[var(--mq-teal-400)]"
         class="flex items-center px-3 py-3 rounded-lg text-[var(--mq-slate-400)] hover:bg-white/5 transition-all">
        <lucide-icon [name]="item.icon" class="w-5 h-5 shrink-0"></lucide-icon>
        <span class="ml-3 font-medium">{{ item.label }}</span>
      </a>
    </nav>
    <div class="p-4 border-t border-[var(--mq-navy-700)]">
      <button type="button" (click)="logout()" class="w-full flex items-center justify-center py-2 text-white bg-red-500/10 text-red-400 hover:bg-red-500/20 rounded-lg transition-colors">
        <lucide-icon name="LogOut" class="w-5 h-5"></lucide-icon>
        <span class="ml-2 font-medium">Logout</span>
      </button>
    </div>
  </aside>
  
</div>
